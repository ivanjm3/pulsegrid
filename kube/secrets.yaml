apiVersion: v1
kind: Secret
metadata:
  name: pulsegrid-secrets
  namespace: pulsegrid
  labels:
    app.kubernetes.io/name: pulsegrid
type: Opaque
stringData:
  # Replace with actual values before applying (or use external-secrets/sealed-secrets)
  DATABASE_URL: "postgres://pulsegrid:CHANGEME@pulsegrid-db.pulsegrid.svc.cluster.local:5432/pulsegrid?sslmode=require"
  AWS_ACCESS_KEY_ID: "CHANGEME"
  AWS_SECRET_ACCESS_KEY: "CHANGEME"
