apiVersion: v1
kind: ConfigMap
metadata:
  name: pulsegrid-config
  namespace: pulsegrid
  labels:
    app.kubernetes.io/name: pulsegrid
data:
  # Kafka
  KAFKA_BROKERS: "kafka-0.kafka.pulsegrid.svc.cluster.local:9092,kafka-1.kafka.pulsegrid.svc.cluster.local:9092,kafka-2.kafka.pulsegrid.svc.cluster.local:9092"
  KAFKA_TOPIC: "transcoding-jobs"
  KAFKA_DLQ_TOPIC: "transcoding-dlq"
  KAFKA_CONSUMER_GROUP: "pulsegrid-workers"

  # S3
  AWS_REGION: "us-east-1"
  PULSEGRID_SOURCE_BUCKET: "pulsegrid-source"

  # Worker-specific env var names (mapped in worker deployment)
  JOB_TOPIC: "transcoding-jobs"
  DLQ_TOPIC: "transcoding-dlq"
  CONSUMER_GROUP: "pulsegrid-workers"
